agent_erp:
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'erp_admin') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'change-me-in-production') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'agent_erp') }}"
      schema: public
      threads: 4
  target: dev
