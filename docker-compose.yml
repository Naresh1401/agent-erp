version: "3.9"

services:
  # ── PostgreSQL with pgvector ──────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agent_erp}
      POSTGRES_USER: ${POSTGRES_USER:-erp_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-production}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-erp_admin}"]
      interval: 5s
      retries: 5

  # ── Qdrant Vector DB ──────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.0
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  # ── Redis (Agent Task Queue) ──────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # ── OpenTelemetry Collector ───────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./infra/otel-collector-config.yml:/etc/otel-collector-config.yml
    ports:
      - "4317:4317"   # gRPC
      - "4318:4318"   # HTTP
      - "8889:8889"   # Prometheus metrics

  # ── Jaeger (Trace UI) ────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.55
    ports:
      - "16686:16686"  # UI
      - "14268:14268"

  # ── Prometheus ────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  # ── Grafana Dashboard ─────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana

  # ── Backend API ───────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_started
    volumes:
      - ./backend:/app/backend

  # ── Agent Worker (background agent execution) ─────────────
  agent-worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: python -m backend.workers.agent_worker
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_started
    volumes:
      - ./backend:/app/backend

  # ── Frontend ──────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
  qdrant_data:
  grafana_data:
